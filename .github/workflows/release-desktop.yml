# Electron desktop release — Faz 1C+ (primary after parity)
# Tag: desktop-vYYYY.M.P — version from apps/desktop/package.json
name: Release Desktop (Electron)

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      title: ${{ steps.ver.outputs.title }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        run: |
          VER=$(node -p "require('./apps/desktop/package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            EXP="desktop-v${VER}"
            test "$TAG" = "$EXP" || { echo "Tag $TAG != expected $EXP"; exit 1; }
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "title=Desktop v$VER" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: resolve-version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @termsh/core-napi build
      - run: pnpm --filter @termsh/desktop dist
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve-version.outputs.title }}
          generate_release_notes: true
          files: |
            apps/desktop/dist/electron/*.dmg
