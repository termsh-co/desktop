# Legacy Tauri release — deprecated after Electron parity (see release-desktop.yml)
# Etiket: desktop-vYYYY.M.P — version from apps/desktop-legacy/package.json
name: Release Legacy (Tauri)

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      title: ${{ steps.ver.outputs.title }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve desktop version from tag
        id: ver
        run: |
          VER=$(node -p "require('./apps/desktop-legacy/package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            EXP="desktop-v${VER}"
            test "$TAG" = "$EXP" || { echo "Tag $TAG != expected $EXP (apps/desktop-legacy/package.json)"; exit 1; }
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "title=Desktop v$VER" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: resolve-version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Tauri version from package.json
        run: node apps/desktop-legacy/scripts/sync-version.mjs

      - name: Test
        run: pnpm test

      - name: Build macOS DMG
        run: pnpm --filter @termsh/desktop-legacy build:beta
        env:
          APPLE_SIGNING_IDENTITY: "-"

      - name: Publish macOS Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve-version.outputs.title }}
          generate_release_notes: true
          files: |
            apps/desktop-legacy/src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    needs: resolve-version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Tauri version from package.json
        run: node apps/desktop-legacy/scripts/sync-version.mjs

      - name: Test
        run: pnpm test

      - name: Build Linux bundles
        run: pnpm --filter @termsh/desktop-legacy tauri build --bundles deb,appimage

      - name: Publish Linux Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve-version.outputs.title }}
          generate_release_notes: true
          files: |
            apps/desktop-legacy/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop-legacy/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    needs: resolve-version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Tauri version from package.json
        run: node apps/desktop-legacy/scripts/sync-version.mjs

      - name: Test
        run: pnpm test:js

      - name: Typecheck
        run: pnpm check:release

      - name: Build Windows NSIS
        run: pnpm --filter @termsh/desktop-legacy tauri build --bundles nsis

      - name: Publish Windows Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve-version.outputs.title }}
          generate_release_notes: true
          files: |
            apps/desktop-legacy/src-tauri/target/release/bundle/nsis/*.exe
